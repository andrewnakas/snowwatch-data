# SNOTEL observations — the ground truth / training targets.
# Daily for the standard target; hourly for QC rebuilds of stations whose
# daily series trips the despiker. These become the QC'd 24h snowfall target
# (the y the post-processor regresses on).
id: snotel_obs
role: Observed snow depth, SWE, precip, temperature — the verification truth.

source:
  name: nrcs_awdb
  type: rest
  base_url: https://wcc.sc.egov.usda.gov/awdbRestApi/services/v1
  endpoints:
    stations: GET /stations?networkCds=SNTL   # catalogue (id, triplet, lat, lon, elev, beginDate/endDate)
    data: GET /data                            # the observation pull
  data_request:
    # comma-separated; ~40 triplets/call is safe
    stationTriplets: "<csv of triplets, e.g. 1344:CO:SNTL,335:CO:SNTL>"
    elements: "WTEQ,SNWD,PRCPSA,TAVG"
    duration: "DAILY"          # or "HOURLY" (SNWD,WTEQ only) for QC rebuilds
    beginDate: "YYYY-MM-DD"
    endDate: "YYYY-MM-DD"
  response_shape: >
    JSON list, one object per station with .stationTriplet and .data[] where
    each .data[] has .stationElement.elementCode (WTEQ|SNWD|PRCPSA|TAVG) and
    .values[] of {date, value}. Map elementCode -> key per `elements` below.
  note: >
    No auth required. Public USDA NRCS Air-Water Database REST API. Triplets
    come from the /stations call (the catalogue is also pinned in
    stations.csv). See snowwatch/app/snotel.py for a reference client.

elements:
  - {code: SNWD,   key: snow_depth, units: in_native, note: ultrasonic; noisy, needs QC}
  - {code: WTEQ,   key: swe,        units: in_native, note: snow pillow}
  - {code: PRCPSA, key: precip,     units: in_native, note: snow-adjusted precip accum}
  - {code: TAVG,   key: tavg,       units: degF_native}

durations:
  daily:
    role: primary target series
    history: full station record
  hourly:
    role: QC rebuild for flagged stations only (not bulk)
    elements: [SNWD, WTEQ]

# SnowWatch builds the target downstream (despike, stuck-run flags, pillow/
# gauge corroboration, SLR-banded snowfall). This spec just lands raw obs;
# the QC logic lives in snowwatch/app/targets.py. Store native units as
# reported by AWDB; document but don't convert.
dims: [station, time]
target_store: schemas/snotel_obs.zarr.md
